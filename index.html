<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPS</title>
  </head>
  <body>
    <div class="heading">
      <h1>Welcome to Rock, Paper and Scissors.</h1>
    </div>
    <div class="moves">
      <div class="moves-container">
        <div class="user-move">
          <p class="user-heading">User:</p>
          <img src="" alt="" class="user-img" />
        </div>
        <div class="computer-move">
          <p class="computer-heading">Computer:</p>
          <img src="" alt="" class="computer-img" />
        </div>
      </div>
      <div class="outcome">
        <p class="result-display">Tie</p>
      </div>
    </div>

    <div class="buttons">
      <button class="btn" id="rock-btn" data-name="rock">
        <img src="images/rock-emoji.png" alt="" />
      </button>
      <button class="btn" id="paper-btn" data-name="paper">
        <img src="images/paper-emoji.png" alt="" />
      </button>
      <button class="btn" id="scissors-btn" data-name="scissors">
        <img src="images/scissors-emoji.png" alt="" />
      </button>
    </div>
    <div class="result-container">
      <p id="user-score">User : 0</p>
      <p id="computer-score">Computer: 0</p>
      <p id="draws">Draws : 0</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
