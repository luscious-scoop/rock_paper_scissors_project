<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPS</title>
  </head>
  <body>
    <h1>Welcome to Rock, Paper and Scissors.</h1>

    <div class="buttons">
      <button class="btn" id="rock-btn">
        <img src="images/rock-emoji.png" alt="" />
      </button>
      <button class="btn" id="paper-btn">
        <img src="images/paper-emoji.png" alt="" />
      </button>
      <button class="btn" id="scissors-btn">
        <img src="images/scissors-emoji.png" alt="" />
      </button>
    </div>
    <div class="result-container">
      <p>User:2</p>
      <p>Computer:2</p>
      <p>Draws:2</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
