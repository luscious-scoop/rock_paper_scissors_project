<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPS</title>
  </head>
  <body>
    <h1>Welcome to Rock, Paper and Scissors.</h1>

    <div class="container">
      <div class="result-container">
        <div class="moves-display">
          <div class="user">
            <p>You picked: Rock</p>
            <p>Score: Wins:2, Loses:2, Ties:2</p>
          </div>
          <div class="computer">
            <p>You picked: Rock</p>
            <p>Score: Wins:2, Loses:2, Ties:2</p>
          </div>
        </div>
      </div>
      <div class="buttons">
        <button class="btn" id="rock-btn">
          <img src="images/rock-emoji.png" alt="" />
        </button>
        <button class="btn" id="paper-btn">
          <img src="images/paper-emoji.png" alt="" />
        </button>
        <button class="btn" id="scissors-btn">
          <img src="images/scissors-emoji.png" alt="" />
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
